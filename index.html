<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة مغسلة الفاروق للسجاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>

        :root {
            --primary: #4F7CAC;
            --primary-dark: #315D88;
            --secondary: #62C7C3;
            --accent: #FFB7C5;
            --accent-soft: #FFF0F4;
            --background: #F7FBFD;
            --surface: rgba(255, 255, 255, 0.94);
            --surface-solid: #FFFFFF;
            --text: #243447;
            --muted: #728196;
            --green: #31B777;
            --green-soft: #E7F8F0;
            --red: #E45D70;
            --red-soft: #FFF0F2;
            --border: #E4EDF3;
            --shadow: 0 12px 30px rgba(49, 93, 136, 0.10);
            --shadow-small: 0 6px 18px rgba(49, 93, 136, 0.08);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            color: var(--text);
            padding:
                max(14px, env(safe-area-inset-top))
                12px
                max(28px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            background:
                radial-gradient(circle at 8% 5%, rgba(255,183,197,.28) 0 70px, transparent 72px),
                radial-gradient(circle at 92% 18%, rgba(98,199,195,.22) 0 95px, transparent 97px),
                linear-gradient(180deg, #F3FAFD 0%, #FFF9FB 100%);
        }

        button, input, select {
            font: inherit;
        }

        button {
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        header {
            position: relative;
            overflow: hidden;
            isolation: isolate;
            min-height: 205px;
            padding: 25px 20px 22px;
            border-radius: var(--radius-xl);
            color: white;
            text-align: center;
            background:
                linear-gradient(145deg, rgba(79,124,172,.98), rgba(98,199,195,.94));
            box-shadow: 0 16px 36px rgba(49,93,136,.23);
        }

        header::before,
        header::after {
            content: "";
            position: absolute;
            z-index: -1;
            border-radius: 50%;
            background: rgba(255,255,255,.14);
        }

        header::before {
            width: 160px;
            height: 160px;
            top: -75px;
            right: -45px;
        }

        header::after {
            width: 105px;
            height: 105px;
            bottom: -55px;
            left: -20px;
        }

        .brand-logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 9px;
            border-radius: 24px;
            display: grid;
            place-items: center;
            font-size: 43px;
            background: rgba(255,255,255,.20);
            border: 1px solid rgba(255,255,255,.35);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 8px 20px rgba(0,0,0,.10);
            animation: float 3.6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-6px) rotate(3deg); }
        }

        h1 {
            font-size: clamp(24px, 7vw, 30px);
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: 5px;
            text-shadow: 0 2px 6px rgba(0,0,0,.12);
        }

        .subtitle {
            font-size: 14px;
            font-weight: 500;
            opacity: .94;
            margin-bottom: 14px;
        }

        .price-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            background: rgba(255,255,255,.20);
            border: 1px solid rgba(255,255,255,.34);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.20);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .carpet-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .carpet-card,
        .custom-card,
        .delivery-card,
        .invoice-card {
            background: var(--surface);
            border: 1px solid rgba(228,237,243,.92);
            box-shadow: var(--shadow-small);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .carpet-card {
            min-height: 112px;
            padding: 13px 9px;
            border-radius: 19px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 11px;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }

        .carpet-card:active {
            transform: scale(.98);
            border-color: rgba(98,199,195,.45);
        }

        .size-info {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .size-icon {
            font-size: 18px;
            flex: 0 0 auto;
        }

        .size-text {
            min-width: 0;
            font-weight: 800;
            font-size: 14px;
            color: var(--text);
            white-space: nowrap;
        }

        .counter-controls {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-counter {
            width: 39px;
            height: 39px;
            flex: 0 0 39px;
            border: none;
            border-radius: 50%;
            display: grid;
            place-items: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            transition: transform .15s ease, filter .15s ease;
            box-shadow: 0 5px 12px rgba(36,52,71,.08);
        }

        .btn-counter:active {
            transform: scale(.88);
            filter: brightness(.97);
        }

        .btn-minus {
            color: var(--red);
            background: var(--red-soft);
        }

        .btn-plus {
            color: var(--green);
            background: var(--green-soft);
        }

        .quantity-display {
            min-width: 24px;
            text-align: center;
            color: var(--text);
            font-size: 18px;
            font-weight: 900;
            transition: transform .15s ease;
        }

        .quantity-active {
            transform: scale(1.25);
        }

        .custom-card,
        .delivery-card {
            padding: 18px;
            border-radius: var(--radius-lg);
        }

        .custom-title,
        .delivery-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 16px;
            font-weight: 800;
        }

        .custom-title {
            margin-bottom: 14px;
        }

        .custom-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 11px;
        }

        .input-box {
            min-width: 0;
            padding: 9px 11px;
            border: 1.5px solid transparent;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: #F2F7FA;
            transition: border-color .2s ease, background .2s ease, box-shadow .2s ease;
        }

        .input-box:focus-within {
            background: white;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(98,199,195,.13);
        }

        .input-box label {
            flex: 0 0 auto;
            font-size: 12px;
            color: var(--muted);
            font-weight: 700;
        }

        .input-field {
            width: 100%;
            min-width: 0;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 16px;
            font-weight: 800;
            text-align: center;
        }

        .btn-add-custom {
            width: 100%;
            min-height: 49px;
            padding: 12px 15px;
            border: none;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            color: white;
            font-size: 15px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 8px 18px rgba(79,124,172,.18);
            transition: transform .16s ease;
        }

        .btn-add-custom:active {
            transform: scale(.98);
        }

        .custom-added-list {
            margin-top: 11px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .delivery-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-text {
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }

        .toggle-text.active {
            color: var(--primary-dark);
        }

        .switch {
            position: relative;
            width: 52px;
            height: 30px;
            display: inline-block;
        }

        .switch input {
            width: 0;
            height: 0;
            opacity: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            cursor: pointer;
            border-radius: 999px;
            background: #DCE6EC;
            transition: .25s ease;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            right: 4px;
            bottom: 4px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 3px 8px rgba(36,52,71,.16);
            transition: .25s ease;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        input:checked + .slider::before {
            transform: translateX(-22px);
        }

        .delivery-dropdown {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height .3s ease, opacity .25s ease, margin-top .3s ease;
        }

        .delivery-dropdown.show {
            max-height: 100px;
            opacity: 1;
            margin-top: 14px;
        }

        .select-field {
            width: 100%;
            min-height: 48px;
            padding: 10px 13px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            outline: none;
            background: #F2F7FA;
            color: var(--text);
            font-size: 15px;
            font-weight: 800;
        }

        .select-field:focus {
            border-color: var(--secondary);
            background: white;
            box-shadow: 0 0 0 4px rgba(98,199,195,.13);
        }

        .action-buttons {
            position: sticky;
            bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 10;
            display: grid;
            grid-template-columns: 2fr .9fr;
            gap: 9px;
            padding: 8px;
            border: 1px solid rgba(228,237,243,.88);
            border-radius: 21px;
            background: rgba(255,255,255,.82);
            box-shadow: 0 12px 28px rgba(49,93,136,.16);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .btn-calculate,
        .btn-reset {
            min-height: 54px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 800;
            transition: transform .15s ease;
        }

        .btn-calculate {
            border: none;
            color: white;
            font-size: 17px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--secondary));
            box-shadow: 0 8px 18px rgba(49,93,136,.20);
        }

        .btn-reset {
            border: 1.5px solid #FFD3DA;
            color: var(--red);
            font-size: 14px;
            background: var(--red-soft);
        }

        .btn-calculate:active,
        .btn-reset:active {
            transform: scale(.97);
        }

        .invoice-card {
            display: none;
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 2px solid rgba(98,199,195,.22);
            box-shadow: var(--shadow);
            animation: slideDown .32s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .invoice-header {
            padding-bottom: 12px;
            margin-bottom: 15px;
            border-bottom: 2px solid #EEF4F7;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            font-size: 17px;
            font-weight: 900;
        }

        .invoice-items {
            display: flex;
            flex-direction: column;
        }

        .invoice-row-divider {
            margin: 12px 0;
            border: none;
            border-top: 2px dashed #E1EAF0;
        }

        .bill-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bill-item-header,
        .delivery-bill-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 15px;
            font-weight: 900;
        }

        .bill-item-header {
            color: var(--primary-dark);
        }

        .delivery-bill-row {
            color: var(--text);
        }

        .bill-details {
            display: flex;
            justify-content: space-between;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .bill-details span span {
            color: var(--text);
        }

        .total-bill-row {
            padding: 13px;
            border-radius: 17px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: linear-gradient(135deg, #EFF8FB, #FFF4F7);
        }

        .bill-summary-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--muted);
            font-size: 14px;
            font-weight: 700;
        }

        .bill-summary-row span span {
            color: var(--text);
            font-weight: 900;
        }

        .total-title {
            color: var(--text);
            font-size: 18px;
            font-weight: 900;
        }

        .total-price {
            color: var(--green);
            font-size: 25px;
            font-weight: 900;
        }

        .rounding-note {
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            text-align: left;
        }

        .btn-delete-custom {
            padding: 5px;
            border: none;
            background: transparent;
            color: var(--red);
            cursor: pointer;
            font-size: 16px;
        }

        footer {
            margin: 4px 0 12px;
            padding: 0 10px;
            color: var(--muted);
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.7;
        }

        @media (hover: hover) and (pointer: fine) {
            .carpet-card:hover {
                transform: translateY(-3px);
                border-color: rgba(98,199,195,.45);
                box-shadow: 0 12px 24px rgba(49,93,136,.12);
            }
        }

        @media (max-width: 360px) {
            body {
                padding-inline: 8px;
            }

            .container {
                gap: 11px;
            }

            .carpet-list {
                gap: 7px;
            }

            .carpet-card {
                min-height: 105px;
                padding-inline: 6px;
            }

            .size-text {
                font-size: 12.5px;
            }

            .btn-counter {
                width: 35px;
                height: 35px;
                flex-basis: 35px;
            }

            .custom-card,
            .delivery-card,
            .invoice-card {
                padding: 15px;
            }

            .action-buttons {
                grid-template-columns: 1.7fr 1fr;
            }

            .btn-calculate {
                font-size: 15px;
            }
        }

        @media (min-width: 700px) {
            body {
                padding-top: 28px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                scroll-behavior: auto !important;
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important;
            }
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand-logo">🫧</div>
        <h1>مغسلة الفاروق</h1>
        <div class="subtitle">حساب سريع ولطيف لغسيل السجاد والمفروشات</div>
        <div class="price-badge">سعر المتر المربع: 12 شيكل</div>
    </header>

    <div class="carpet-list" id="carpet-list"></div>

    <div class="custom-card">
        <div class="custom-title">
            <span>📏 إضافة مقاس غير موجود بالقائمة</span>
        </div>
        <div class="custom-inputs">
            <div class="input-box">
                <label>الطول:</label>
                <input type="number" id="custom-height" class="input-field" placeholder="سم" min="1">
            </div>
            <div class="input-box">
                <label>العرض:</label>
                <input type="number" id="custom-width" class="input-field" placeholder="سم" min="1">
            </div>
        </div>
        <button class="btn-add-custom" onclick="addCustomCarpet()">
            <i class="fa-solid fa-plus"></i> إضافة المقاس
        </button>

        <div class="custom-added-list" id="custom-added-list"></div>
    </div>

    <div class="delivery-card">
        <div class="delivery-row" onclick="toggleDelivery()">
            <div class="delivery-title">
                <span>🚚 خدمة التوصيل</span>
            </div>
            <div class="toggle-container" onclick="event.stopPropagation();">
                <span class="toggle-text" id="toggle-state-text">لا</span>
                <label class="switch">
                    <input type="checkbox" id="delivery-checkbox" onchange="onDeliveryToggle()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="delivery-dropdown" id="delivery-options">
            <select id="delivery-zone" class="select-field">
                <option value="30">رهط</option>
                <option value="30">حورة</option>
                <option value="30">اللقية</option>
                <option value="30">تل السبع</option>
                <option value="30">شقيب السلام</option>
                <option value="50">بئر السبع</option>
                <option value="50">كسيفه</option>
                <option value="50">ابو قويدر</option>
            </select>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-calculate" onclick="calculateTotal()">
            <i class="fa-solid fa-calculator"></i> احسب السعر
        </button>
        <button class="btn-reset" onclick="resetAll()">
            <i class="fa-solid fa-trash-can"></i> تصفير
        </button>
    </div>

    <div class="invoice-card" id="invoice-card">
        <div class="invoice-header">
            <i class="fa-solid fa-file-invoice-dollar" style="color: var(--primary-color); font-size: 18px;"></i>
            <span>ملخص الحساب</span>
        </div>
        
        <div class="invoice-items" id="invoice-items-list">
            </div>
    </div>

    <footer>
        مغسلة الفاروق &copy; 2026<br>نظافة، عناية ولمسة انتعاش تليق بكم 🫧✨
    </footer>
</div>

<script>
    // القياسات مرتبة: (h = الطول, w = العرض, label = مسمى اختياري)
    const standardSizes = [
        { h: 110, w: 60 }, 
        { h: 150, w: 80 }, 
        { h: 200, w: 80 },
        { h: 300, w: 80 },
        { h: 300, w: 100 }, 
        { h: 120, w: 120, label: 'دائري' }, 
        { h: 180, w: 120 }, 
        { h: 190, w: 130 },
        { h: 140, w: 140, label: 'دائري' },
        { h: 200, w: 140 }, 
        { h: 220, w: 150 }, 
        { h: 160, w: 160, label: 'دائري' },
        { h: 230, w: 160 },
        { h: 270, w: 170 }, 
        { h: 280, w: 180 }, 
        { h: 290, w: 200 },
        { h: 330, w: 220 },
        { h: 400, w: 300 },
        { h: 500, w: 400 }
    ];

    let quantities = {};
    let customCarpets = [];
    const PRICE_PER_SQM = 12;

    // تهيئة القائمة
    function init() {
        const listContainer = document.getElementById('carpet-list');
        listContainer.innerHTML = '';
        
        standardSizes.forEach(size => {
            const key = `${size.h}/${size.w}${size.label ? '/' + size.label : ''}`;
            quantities[key] = 0;

            const labelText = size.label ? ` (${size.label})` : '';

            const card = document.createElement('div');
            card.className = 'carpet-card';
            card.innerHTML = `
                <div class="size-info">
                    <span class="size-icon">🧼</span>
                    <span class="size-text">${size.h} × ${size.w}${labelText}</span>
                </div>
                <div class="counter-controls">
                    <button class="btn-counter btn-minus" onclick="changeQuantity('${key}', -1)">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <span class="quantity-display" id="qty-${key.replace(/\//g, '-')}">0</span>
                    <button class="btn-counter btn-plus" onclick="changeQuantity('${key}', 1)">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    // تعديل الكمية
    function changeQuantity(key, change) {
        let current = quantities[key] || 0;
        current += change;
        if (current < 0) current = 0;
        quantities[key] = current;
        
        const display = document.getElementById(`qty-${key.replace(/\//g, '-')}`);
        display.innerText = current;
        
        display.classList.add('quantity-active');
        setTimeout(() => display.classList.remove('quantity-active'), 150);
    }

    // إضافة مقاس مخصص
    function addCustomCarpet() {
        const heightInput = document.getElementById('custom-height');
        const widthInput = document.getElementById('custom-width');
        const h = parseInt(heightInput.value);
        const w = parseInt(widthInput.value);

        if (!w || !h || w <= 0 || h <= 0) {
            alert('الرجاء إدخال أرقام مقاسات صحيحة أولاً!');
            return;
        }

        customCarpets.push({
            id: Date.now(),
            h: h,
            w: w,
            qty: 1
        });

        heightInput.value = '';
        widthInput.value = '';
        renderCustomList();
    }

    function changeCustomQuantity(id, change) {
        const carpet = customCarpets.find(item => item.id === id);
        if (carpet) {
            carpet.qty += change;
            if (carpet.qty <= 0) {
                deleteCustomCarpet(id);
                return;
            }
            renderCustomList();
        }
    }

    function deleteCustomCarpet(id) {
        customCarpets = customCarpets.filter(item => item.id !== id);
        renderCustomList();
    }

    // عرض المقاسات المخصصة المضافة
    function renderCustomList() {
        const container = document.getElementById('custom-added-list');
        container.innerHTML = '';

        customCarpets.forEach(item => {
            const div = document.createElement('div');
            div.className = 'carpet-card';
            div.style.background = '#ECFDF5';
            div.style.borderColor = 'rgba(34, 197, 94, 0.2)';
            div.style.display = 'flex';
            div.style.flexDirection = 'row';
            div.style.justifyContent = 'space-between';
            div.style.width = '100%';
            
            div.innerHTML = `
                <div class="size-info">
                    <span class="size-icon" style="color: var(--green)">📏</span>
                    <span class="size-text">${item.h} × ${item.w} (يدوي)</span>
                </div>
                <div class="counter-controls" style="width: auto;">
                    <button class="btn-counter btn-minus" onclick="changeCustomQuantity(${item.id}, -1)">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                    <span class="quantity-display">${item.qty}</span>
                    <button class="btn-counter btn-plus" onclick="changeCustomQuantity(${item.id}, 1)">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                    <button class="btn-delete-custom" onclick="deleteCustomCarpet(${item.id})">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // تفعيل التوصيل
    function toggleDelivery() {
        const checkbox = document.getElementById('delivery-checkbox');
        checkbox.checked = !checkbox.checked;
        onDeliveryToggle();
    }

    function onDeliveryToggle() {
        const checkbox = document.getElementById('delivery-checkbox');
        const optionsDiv = document.getElementById('delivery-options');
        const textState = document.getElementById('toggle-state-text');
        
        if (checkbox.checked) {
            optionsDiv.classList.add('show');
            textState.innerText = "نعم";
            textState.classList.add('active');
        } else {
            optionsDiv.classList.remove('show');
            textState.innerText = "لا";
            textState.classList.remove('active');
        }
    }

    // التقريب لأقرب 10
    function roundToNearestTen(value) {
        let roundedNum = Math.round(value); 
        let lastDigit = roundedNum % 10; 

        if (lastDigit < 5) {
            return roundedNum - lastDigit; 
        } else {
            return roundedNum + (10 - lastDigit); 
        }
    }

    // حساب التكلفة الإجمالية
    function calculateTotal() {
        const itemsList = document.getElementById('invoice-items-list');
        itemsList.innerHTML = '';
        
        let rawTotalSum = 0; 
        let totalCarpetsQty = 0; 
        let hasItems = false;
        let elementsHTML = '';

        // 1. معالجة السجاد الثابت
        for (const [key, qty] of Object.entries(quantities)) {
            if (qty > 0) {
                hasItems = true;
                totalCarpetsQty += qty;
                const parts = key.split('/');
                const hM = parseInt(parts[0]) / 100;
                const wM = parseInt(parts[1]) / 100;
                const labelText = parts[2] ? ` (${parts[2]})` : '';
                
                const area = hM * wM * qty;
                const price = area * PRICE_PER_SQM;
                rawTotalSum += price;

                elementsHTML += `
                    <div class="bill-item">
                        <div class="bill-item-header">
                            <span>🧼 ${parts[0]} × ${parts[1]}${labelText}</span>
                            <span>${price.toFixed(2)} ₪</span>
                        </div>
                        <div class="bill-details">
                            <span>المساحة الكلية: <span>${area.toFixed(2)} م²</span></span>
                        </div>
                    </div>
                    <hr class="invoice-row-divider">
                `;
            }
        }

        // 2. معالجة السجاد المخصص
        customCarpets.forEach(item => {
            if (item.qty > 0) {
                hasItems = true;
                totalCarpetsQty += item.qty;
                const hM = item.h / 100;
                const wM = item.w / 100;
                
                const area = hM * wM * item.qty;
                const price = area * PRICE_PER_SQM;
                rawTotalSum += price;

                elementsHTML += `
                    <div class="bill-item">
                        <div class="bill-item-header">
                            <span>📏 ${item.h} × ${item.w} (يدوي)</span>
                            <span>${price.toFixed(2)} ₪</span>
                        </div>
                        <div class="bill-details">
                            <span>المساحة الكلية: <span>${area.toFixed(2)} م²</span></span>
                        </div>
                    </div>
                    <hr class="invoice-row-divider">
                `;
            }
        });

        if (!hasItems) {
            alert('الرجاء اختيار مقاس واحد على الأقل أولاً لإجراء الحساب!');
            document.getElementById('invoice-card').style.display = 'none';
            return;
        }

        // 3. حساب سعر التوصيل
        const deliveryChecked = document.getElementById('delivery-checkbox').checked;
        let deliveryPrice = 0;
        if (deliveryChecked) {
            const selectElement = document.getElementById('delivery-zone');
            deliveryPrice = parseFloat(selectElement.value);
            const zoneName = selectElement.options[selectElement.selectedIndex].text;
            
            rawTotalSum += deliveryPrice;

            elementsHTML += `
                <div class="delivery-bill-row">
                    <span>🚚 التوصيل (${zoneName})</span>
                    <span>${deliveryPrice.toFixed(2)} ₪</span>
                </div>
                <hr class="invoice-row-divider">
            `;
        }

        const roundedTotal = roundToNearestTen(rawTotalSum);

        // 4. عرض الإجمالي المحدث
        elementsHTML += `
            <div class="total-bill-row">
                <div class="bill-summary-row">
                    <span>عدد السجاد الإجمالي:</span>
                    <span><span>${totalCarpetsQty}</span> قطع</span>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 6px;">
                    <span class="total-title">الإجمالي النهائي</span>
                    <span class="total-price">${roundedTotal} ₪</span>
                </div>
                <div class="rounding-note">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>المبلغ مقرب لأقرب 10 شواكل تيسيراً للفكة</span>
                </div>
            </div>
        `;

        itemsList.innerHTML = elementsHTML;
        
        const invoiceCard = document.getElementById('invoice-card');
        invoiceCard.style.display = 'block';
        setTimeout(() => {
            invoiceCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    // تصفير البيانات
    function resetAll() {
        if (confirm('هل أنت متأكد من تصفير الفاتورة وإلغاء كافة الاختيارات؟')) {
            quantities = {};
            customCarpets = [];
            document.getElementById('custom-added-list').innerHTML = '';
            document.getElementById('custom-width').value = '';
            document.getElementById('custom-height').value = '';
            
            const checkbox = document.getElementById('delivery-checkbox');
            checkbox.checked = false;
            onDeliveryToggle();
            
            document.getElementById('invoice-card').style.display = 'none';
            init();
        }
    }

    window.onload = init;
</script>

</body>
</html>
